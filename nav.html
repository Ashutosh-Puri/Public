
<html>
<head>
<style>
ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: lightgray;
}

 li {
  float: left;
} 

li a {
  display: block;
  color: blue;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
}


.active {
  background-color: gray;
  color: white;
}
</style>
</head>
<body>

<ul>
  <li><a class="active">Home</a></li>
  <li><a >JAVA</a></li>
  <li><a >HTML</a></li>
  <li><a >CSS</a></li>
</ul>

</body>
</html>
